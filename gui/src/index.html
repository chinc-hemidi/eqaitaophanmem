<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Emotion Check-in System</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Sora:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="/icons/eq-favicon.svg">
  <style>
    .bootstrap-fallback {
      display: block;
      max-width: 560px;
      margin: 40px auto 0;
      padding: 16px;
      border: 1px solid rgba(140, 0, 1, 0.18);
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.9);
      color: #3b1111;
      font-family: "DM Sans", "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    .bootstrap-fallback h1 {
      margin: 0 0 8px;
      font-family: "Sora", "Segoe UI", sans-serif;
      font-size: 1.1rem;
      color: #8c0001;
    }

    .bootstrap-fallback p {
      margin: 0 0 8px;
      font-size: 0.92rem;
    }

    .bootstrap-fallback a {
      color: #8c0001;
      font-weight: 700;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
  </style>
</head>
<body>
  <app-root>
    <section id="bootstrap-fallback" class="bootstrap-fallback">
      <h1>Không tải được giao diện check-in</h1>
      <p>Trình duyệt hiện tại đang chặn tải script hoặc bị cảnh báo ngrok chèn vào.</p>
      <p>Vui lòng mở liên kết bằng Safari/Chrome (trình duyệt ngoài ứng dụng) rồi thử lại.</p>
      <p><a href="#" id="open-current-link">Mở lại liên kết này</a></p>
    </section>
  </app-root>
  <script>
    (function () {
      var fallback = document.getElementById('bootstrap-fallback');
      var retryLink = document.getElementById('open-current-link');
      var root = document.querySelector('app-root');

      if (!fallback || !root) {
        return;
      }

      if (retryLink) {
        retryLink.setAttribute('href', window.location.href);
      }

      fallback.style.display = 'none';

      var observer = new MutationObserver(function () {
        var hasBooted = root.children.length > 1 || (root.children.length === 1 && root.children[0] !== fallback);
        if (hasBooted) {
          fallback.style.display = 'none';
          observer.disconnect();
        }
      });
      observer.observe(root, { childList: true, subtree: false });

      window.setTimeout(function () {
        var hasBooted = root.children.length > 1 || (root.children.length === 1 && root.children[0] !== fallback);
        if (!hasBooted) {
          fallback.style.display = 'block';
        }
      }, 2200);
    })();
  </script>
</body>
</html>
