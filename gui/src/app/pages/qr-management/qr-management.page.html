<section class="qr-page">
  <h1>Quản lý QR check-in</h1>

  <article class="panel create">
    <h2>Tạo điểm check-in</h2>
    <input
      type="text"
      placeholder="Tên điểm check-in"
      [ngModel]="name()"
      (ngModelChange)="name.set($event)"
    />
    <textarea
      rows="2"
      placeholder="Mô tả ngắn (tuỳ chọn)"
      [ngModel]="description()"
      (ngModelChange)="description.set($event)"
    ></textarea>
    <button type="button" class="icon-btn" (click)="createPoint()" title="Tạo mới" aria-label="Tạo mới">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </svg>
    </button>
  </article>

  <p class="error" *ngIf="errorMessage()">{{ errorMessage() }}</p>

  <article class="panel list">
    <h2>Danh sách điểm</h2>
    <div class="point" *ngFor="let point of points()">
      <div>
        <strong>{{ point.name }}</strong>
        <p>{{ point.code }}</p>
      </div>
      <div class="actions">
        <button
          type="button"
          class="icon-btn"
          [class.is-off]="!point.isActive"
          (click)="togglePoint(point)"
          [title]="point.isActive ? 'Tắt điểm check-in' : 'Bật điểm check-in'"
          [attr.aria-label]="point.isActive ? 'Tắt điểm check-in' : 'Bật điểm check-in'"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3v8" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            <path d="M7 5.8A8 8 0 1 0 17 5.8" fill="none" stroke="currentColor" stroke-width="2" />
          </svg>
        </button>
        <button
          type="button"
          class="icon-btn"
          (click)="generateQr(point)"
          title="Sinh QR"
          aria-label="Sinh QR"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M4 4h7v7H4zM13 4h7v7h-7zM4 13h7v7H4zM15 13h2v2h-2zM13 17h2v2h-2zM17 17h3v3h-3zM18 13h2v2h-2z"
              fill="currentColor"
            />
          </svg>
        </button>
      </div>
    </div>
  </article>

  <article class="panel" *ngIf="qrPreview() as qr">
    <h2>QR preview</h2>
    <img [src]="qr" alt="QR preview" />
  </article>
</section>
